<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playable — Intonation Practice</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="top-panel" data-state="selection">
    <div class="panel-tabs">
      <button class="panel-tab active" data-panel="selection">Selection</button>
      <button class="panel-tab" data-panel="intonation">Intonation</button>
      <button class="panel-tab" data-panel="none">—</button>
    </div>
    <div id="panel-selection">
      <div class="scale-controls">
        <div id="scale-key-buttons" class="scale-key-buttons"></div>
        <div id="scale-type-buttons" class="scale-type-buttons"></div>
        <button class="oct-btn" id="oct-btn">3 Octaves</button>
      </div>
    </div>
    <div id="panel-intonation">
      <div class="inton-left">
        <div class="inton-stat-group">
          <span class="inton-stat-val inton-note" id="detected-note">-</span>
          <span class="inton-stat-label">DETECTED</span>
        </div>
        <div class="inton-stat-group">
          <span class="inton-stat-val inton-target-val" id="target-note">-</span>
          <span class="inton-stat-label">TARGET</span>
        </div>
        <div class="inton-stat-group">
          <span class="inton-stat-val" id="detected-freq">—</span>
          <span class="inton-stat-label">HZ</span>
        </div>
        <div class="inton-stat-group">
          <span class="inton-stat-val" id="cents-value">—</span>
          <span class="inton-stat-label">CENTS</span>
        </div>
      </div>
      <div class="pitch-graph-wrap">
        <canvas id="pitch-history-canvas"></canvas>
        <div class="pitch-axis-labels">
          <span>-50</span>
          <span>+50</span>
        </div>
      </div>
    </div>
  </div>

  <div id="score-wrapper">
    <div id="score-title"></div>
    <div id="score-container"></div>
  </div>
  <div id="note-name-overlay" class="note-name-overlay" style="display:none"></div>

  <div class="controls">
    <button id="play-btn" disabled>&#9654; Play</button>
    <div class="bpm-group" id="bpm-group"><button class="bpm-step" id="bpm-dec" title="BPM -1">−</button><div class="bpm-scrub" id="bpm-scrub" title="Drag to change BPM · tap to type"><span class="bpm-scrub-label">BPM</span><span class="bpm-scrub-val" id="bpm-scrub-val">120</span></div><button class="bpm-step" id="bpm-inc" title="BPM +1">+</button></div>
    <button id="loop-btn" class="active" title="Toggle loop">⟳</button>
    <button id="count-in-btn" class="active" title="Toggle count-in">♩4</button>
    <button id="note-name-btn" class="active" title="Toggle note names">♩C</button>
  </div>

  <!-- CDN dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/opensheetmusicdisplay@1.9.7/build/opensheetmusicdisplay.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi@2.0.28/build/Midi.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>

services:
  audiveris:
    build:
      context: ./audiveris
    image: playable-audiveris
    container_name: playable-audiveris
    ports:
      - "8001:8001"
    restart: unless-stopped

  oemer:
    build:
      context: ./oemer
    image: playable-oemer
    container_name: playable-oemer
    ports:
      - "8002:8002"
    # Persist downloaded ONNX weights across container rebuilds.
    volumes:
      - oemer-cache:/root/.cache/oemer
    restart: unless-stopped

  clarity:
    build:
      context: ./clarity
    image: playable-clarity
    container_name: playable-clarity
    ports:
      - "8003:8003"
    # Persist HuggingFace model cache.
    volumes:
      - hf-cache:/root/.cache/huggingface
    restart: unless-stopped

volumes:
  oemer-cache:
  hf-cache:

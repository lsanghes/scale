<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playable — Intonation Practice</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Playable</h1>
    <div class="toolbar-group">
      <button id="load-btn">Load Score</button>
      <input type="file" id="file-input" accept=".musicxml,.xml,.mxl,.mid,.midi">
      <select id="part-select" disabled>
        <option>Part</option>
      </select>
      <select id="mode-select">
        <option value="simultaneous">Simultaneous</option>
        <option value="ping">Ping</option>
        <option value="drone">Drone</option>
      </select>
      <select id="scroll-mode-select" title="Scroll mode">
        <option value="jump">Scroll: Jump</option>
        <option value="continuous" selected>Scroll: Continuous</option>
      </select>
      <button id="collapse-btn" title="Focus view (F)">&#x26F6;</button>
    </div>
  </header>

  <nav id="view-tabs">
    <button class="view-tab active" data-view="scales">Scales</button>
  </nav>

  <div id="scale-container" style="display:none">
    <div class="scale-controls">
      <div id="scale-key-buttons" class="scale-key-buttons"></div>
      <div id="scale-type-buttons" class="scale-type-buttons"></div>
      <div class="submode-toggle">
        <button id="submode-play-along" class="active">Play Along</button>
        <button id="submode-detect">Detect</button>
      </div>
      <div class="submode-toggle" id="octave-buttons">
        <button class="octave-btn" data-octaves="1">1 Oct</button>
        <button class="octave-btn" data-octaves="2">2 Oct</button>
        <button class="octave-btn active" data-octaves="3">3 Oct</button>
      </div>
    </div>
  </div>

  <div id="score-container">
    <p>Load a MusicXML or MIDI file to see the score, or just start for free play.</p>
  </div>
  <div id="note-name-overlay" class="note-name-overlay" style="display:none"></div>
  <div id="midi-note-list"></div>

  <div class="pitch-hud">
    <div class="note-display">
      <div class="note-box detected">
        <label>Detected</label>
        <div class="note-name" id="detected-note">-</div>
        <div class="note-freq" id="detected-freq"></div>
      </div>
      <div class="note-box target">
        <label>Target</label>
        <div class="note-name" id="target-note">-</div>
      </div>
    </div>

    <div class="cents-meter" id="cents-meter">
      <div class="cents-track">
        <div class="cents-center"></div>
        <div class="cents-indicator" id="cents-indicator"></div>
      </div>
    </div>
    <div class="cents-labels">
      <span>-50¢</span>
      <span>0</span>
      <span>+50¢</span>
    </div>
    <div class="cents-value" id="cents-value"></div>

    <div class="confidence">
      <span>Confidence</span>
      <div class="confidence-track">
        <div class="confidence-bar" id="confidence-bar"></div>
      </div>
    </div>
  </div>

  <div class="navigation">
    <button id="prev-measure" title="Previous measure">⏮ Measure</button>
    <button id="prev-note" title="Previous note">◀ Note</button>
    <span class="measure-info" id="measure-info">Load a score to begin</span>
    <button id="next-note" title="Next note">Note ▶</button>
    <button id="next-measure" title="Next measure">Measure ⏭</button>
  </div>

  <div class="controls">
    <button id="play-btn" disabled>&#9654; Play</button>
    <label class="bpm-label">BPM <input type="number" id="bpm-input" value="60" min="20" max="400"></label>
    <div class="bpm-presets">
      <button class="bpm-preset" data-bpm="40">40</button>
      <button class="bpm-preset" data-bpm="50">50</button>
      <button class="bpm-preset" data-bpm="60">60</button>
      <button class="bpm-preset" data-bpm="70">70</button>
      <button class="bpm-preset" data-bpm="80">80</button>
      <button class="bpm-preset" data-bpm="90">90</button>
      <button class="bpm-preset" data-bpm="100">100</button>
      <button class="bpm-preset" data-bpm="110">110</button>
      <button class="bpm-preset" data-bpm="120">120</button>
      <button class="bpm-preset" data-bpm="140">140</button>
      <button class="bpm-preset" data-bpm="160">160</button>
    </div>
    <button id="start-btn">Start</button>
  </div>

  <div class="keyboard-hints">
    <kbd>Space</kbd> Play/Stop &nbsp;
    <kbd>←</kbd> Prev note &nbsp;
    <kbd>→</kbd> Next note &nbsp;
    <kbd>P</kbd> Play/Stop &nbsp;
    <kbd>F</kbd> Focus
  </div>

  <div id="focus-bar">
    <button id="expand-btn" title="Exit focus view">&#x2715;</button>
    <button id="focus-play-btn" disabled>&#9654; Play</button>
    <label class="bpm-label">BPM <input type="number" id="focus-bpm-input" value="60" min="20" max="400"></label>
    <div class="bpm-presets">
      <button class="bpm-preset" data-bpm="40">40</button>
      <button class="bpm-preset" data-bpm="50">50</button>
      <button class="bpm-preset" data-bpm="60">60</button>
      <button class="bpm-preset" data-bpm="70">70</button>
      <button class="bpm-preset" data-bpm="80">80</button>
      <button class="bpm-preset" data-bpm="90">90</button>
      <button class="bpm-preset" data-bpm="100">100</button>
      <button class="bpm-preset" data-bpm="120">120</button>
      <button class="bpm-preset" data-bpm="140">140</button>
      <button class="bpm-preset" data-bpm="160">160</button>
      <button class="bpm-preset" data-bpm="180">180</button>
      <button class="bpm-preset" data-bpm="200">200</button>
    </div>
    <button id="focus-start-btn">Start</button>
  </div>

  <!-- CDN dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/opensheetmusicdisplay@1.9.7/build/opensheetmusicdisplay.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi@2.0.28/build/Midi.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
